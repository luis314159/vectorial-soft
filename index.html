<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function () {
        var t = localStorage.getItem("vectorial-theme");
        if (t !== "light" && t !== "dark") {
          var h = new Date().getHours();
          t = h >= 7 && h < 19 ? "light" : "dark";
        }
        document.documentElement.dataset.theme = t;
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vectorial Soft — AI & Full-Stack Engineering Studio</title>
    <meta
      name="description"
      content="Vectorial Soft is an AI and full-stack engineering studio. We design and ship production-grade AI systems, web platforms and data infrastructure — from the cloud to the factory floor."
    />
    <meta property="og:title" content="Vectorial Soft — AI & Full-Stack Engineering Studio" />
    <meta
      property="og:description"
      content="Production-grade AI systems, web platforms and data infrastructure — from the cloud to the factory floor."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://vectorial-soft.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
